<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Company AI Chatbot</title>
    <style>
        body { font-family: 'Suit', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 800px; background: white; display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0,0,0,0.1); height: 100vh; }
        
        /* 헤더 */
        .header { padding: 20px; background: #ffffff; border-bottom: 1px solid #ddd; font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; color: #333; }
        .header span { color: #4285f4; margin-right: 8px; } /* Gemini Blue */

        /* 채팅 영역 */
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        
        /* 말풍선 공통 */
        .message { max-width: 80%; padding: 12px 18px; border-radius: 18px; font-size: 1rem; line-height: 1.5; position: relative; word-wrap: break-word; }
        
        /* 유저 말풍선 (오른쪽) */
        .user-message { align-self: flex-end; background-color: #4285f4; color: white; border-bottom-right-radius: 4px; }
        
        /* 봇 말풍선 (왼쪽) */
        .bot-message { align-self: flex-start; background-color: #f1f3f4; color: #333; border-bottom-left-radius: 4px; }
        
        /* 입력창 영역 */
        .input-area { padding: 20px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 30px; font-size: 1rem; outline: none; transition: 0.2s; }
        input:focus { border-color: #4285f4; box-shadow: 0 0 5px rgba(66, 133, 244, 0.3); }
        button { padding: 10px 25px; background: #4285f4; color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #3367d6; }
        button:disabled { background: #ccc; }

        /* 로딩 애니메이션 */
        .loading { font-size: 0.8rem; color: #888; margin-left: 10px; display: none; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header"><span>✨</span> 회사 AI 챗봇 시연</div>
    <div class="chat-box" id="chat-box">
        <div class="message bot-message">안녕하세요! 회사에 대해 무엇이든 물어보세요.</div>
    </div>
    <div class="loading" id="loading">답변 생성 중...</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="질문을 입력하세요..." onkeypress="if(event.keyCode==13) sendMessage()">
        <button onclick="sendMessage()" id="send-btn">전송</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const chatBox = document.getElementById('chat-box');
        const loading = document.getElementById('loading');
        
        const question = inputField.value.trim();
        if (!question) return;

        // 1. 유저 메시지 화면에 추가
        appendMessage(question, 'user-message');
        inputField.value = '';
        inputField.disabled = true;
        sendBtn.disabled = true;
        loading.style.display = 'block';

        try {
            // 2. 서버로 전송 (Python)
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ msg: question })
            });
            const data = await response.json();

            // 3. 봇 답변 화면에 추가
            appendMessage(data.answer, 'bot-message');
        } catch (error) {
            appendMessage("오류가 발생했습니다.", 'bot-message');
        }

        // 상태 복구
        inputField.disabled = false;
        sendBtn.disabled = false;
        loading.style.display = 'none';
        inputField.focus();
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight; // 스크롤 맨 아래로
    }
</script>

</body>
</html>
